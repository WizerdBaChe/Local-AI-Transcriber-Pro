<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STT Mind Map Viewer</title>
    <style>
        /* 系統工程筆記：
           極簡 CSS。只負責撐開畫布並隱藏系統滾動條。
           其餘所有節點樣式、線條顏色均交由 CDN 的官方 CSS 接管。
        */
        * { box-sizing: border-box; }
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            background-color: #ffffff;
            overflow: hidden; 
        }
        /* 確保 markmap 容器佔滿整個畫面 */
        .markmap {
            width: 100%;
            height: 100%;
        }
    </style>
    
    <!-- 依賴官方 CDN，確保渲染邏輯永遠是最穩定的版本 -->
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-view@0.17.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/markmap-autoloader@0.17.0"></script>
</head>
<body>
    <!-- 
      Autoloader 渲染區：
      當 markmap-autoloader 載入完成後，會自動掃描此處，
      並將 script 內的 Markdown 轉換為互動式 SVG。
    -->
    <div class="markmap">
        <script type="text/template">
{{MARKDOWN_DATA}}
        </script>
    </div>
</body>
</html>
